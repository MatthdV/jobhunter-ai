{% extends "base.html" %}

{% block title %}Réinitialiser le mot de passe — JobHunter AI{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
      <div class="text-center mb-8">
        <h1 class="text-xl font-bold text-gray-900">Nouveau mot de passe</h1>
        <p class="text-sm text-gray-500 mt-1">JobHunter AI</p>
      </div>

      {% if error %}
      <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg">
        <p class="text-sm text-red-700">{{ error }}</p>
      </div>
      {% endif %}

      {% if token_valid %}
      <form method="post" action="/api/auth/reset-password" class="space-y-4">
        <input type="hidden" name="token" value="{{ token }}">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nouveau mot de passe</label>
          <input type="password" name="password" required autocomplete="new-password" minlength="8"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                 placeholder="••••••••">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirmer</label>
          <input type="password" name="password_confirm" required autocomplete="new-password" minlength="8"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                 placeholder="••••••••">
        </div>
        <button type="submit"
                class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg transition-colors">
          Réinitialiser
        </button>
      </form>
      {% else %}
      <p class="text-center text-sm text-gray-500">
        <a href="/forgot-password" class="text-indigo-600 hover:underline font-medium">Demander un nouveau lien</a>
      </p>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
