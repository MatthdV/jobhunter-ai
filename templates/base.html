<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}JobHunter AI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            indigo: {
              600: '#4f46e5',
              700: '#4338ca',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-56 bg-white border-r border-gray-200 flex flex-col shadow-sm flex-shrink-0">
    <div class="px-5 py-5 border-b border-gray-100">
      <span class="text-indigo-600 font-bold text-lg leading-tight block">JobHunter</span>
      <span class="text-gray-400 text-xs tracking-widest uppercase">AI Pipeline</span>
    </div>
    <nav class="flex-1 py-4 px-3 space-y-1">
      <a href="/"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors
                {% if request.url.path == '/' %}bg-indigo-50 text-indigo-600{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>
      <a href="/jobs"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors
                {% if request.url.path.startswith('/jobs') %}bg-indigo-50 text-indigo-600{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        Offres
      </a>
    </nav>
  </aside>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <main class="flex-1 overflow-y-auto p-6 lg:p-8">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Toast notification container -->
  <div id="toast-container"
       class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
  </div>

  <script>
    // Toast system for HTMX responses
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const colors = {
        success: 'bg-green-600',
        error: 'bg-red-600',
        info: 'bg-indigo-600',
        warning: 'bg-yellow-500',
      };
      toast.className = [
        'pointer-events-auto px-4 py-3 rounded-lg text-white text-sm font-medium shadow-lg',
        'toast-enter',
        colors[type] || colors.info,
      ].join(' ');
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('toast-exit');
        toast.addEventListener('transitionend', () => toast.remove());
      }, 3500);
    }

    // HTMX event hooks
    document.body.addEventListener('htmx:responseError', function (e) {
      showToast('Erreur : ' + (e.detail.xhr.statusText || 'Requête échouée'), 'error');
    });

    document.body.addEventListener('htmx:afterRequest', function (e) {
      const hdr = e.detail.xhr.getResponseHeader('X-Toast');
      if (hdr) {
        let payload;
        try { payload = JSON.parse(hdr); } catch { payload = { message: hdr, type: 'info' }; }
        showToast(payload.message || hdr, payload.type || 'info');
      }
    });
  </script>

</body>
</html>
