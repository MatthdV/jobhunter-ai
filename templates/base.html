<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}JobHunter AI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            indigo: {
              600: '#4f46e5',
              700: '#4338ca',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-56 bg-white border-r border-gray-200 flex flex-col shadow-sm flex-shrink-0">
    <div class="px-5 py-5 border-b border-gray-100">
      <span class="text-indigo-600 font-bold text-lg leading-tight block">JobHunter</span>
      <span class="text-gray-400 text-xs tracking-widest uppercase">AI Pipeline</span>
    </div>
    <nav class="flex-1 py-4 px-3 space-y-1">
      <a href="/"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors
                {% if request.url.path == '/' %}bg-indigo-50 text-indigo-600{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        {{ t.nav_dashboard if t else "Dashboard" }}
      </a>
      <a href="/jobs"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors
                {% if request.url.path.startswith('/jobs') %}bg-indigo-50 text-indigo-600{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        {{ t.nav_jobs if t else "Offres" }}
      </a>
      <a href="/settings"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors
                {% if request.url.path.startswith('/settings') %}bg-indigo-50 text-indigo-600{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        {{ t.nav_settings if t else "Paramètres" }}
      </a>
    </nav>

    <!-- Language toggle -->
    {% if t %}
    <div class="px-5 py-3 border-t border-gray-100">
      <p class="text-xs text-gray-400 mb-1.5">{{ t.lang_toggle_label }}</p>
      <div class="flex gap-1">
        <button onclick="setLang('fr')"
                class="px-2.5 py-1 rounded text-xs font-semibold transition-colors
                       {% if current_lang == 'fr' %}bg-indigo-600 text-white{% else %}text-gray-500 hover:bg-gray-100{% endif %}">
          FR
        </button>
        <button onclick="setLang('en')"
                class="px-2.5 py-1 rounded text-xs font-semibold transition-colors
                       {% if current_lang == 'en' %}bg-indigo-600 text-white{% else %}text-gray-500 hover:bg-gray-100{% endif %}">
          EN
        </button>
      </div>
    </div>
    {% endif %}
  </aside>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <main class="flex-1 overflow-y-auto p-6 lg:p-8">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Toast notification container -->
  <div id="toast-container"
       class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
  </div>

  <script>
    // Toast system for HTMX responses
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const colors = {
        success: 'bg-green-600',
        error: 'bg-red-600',
        info: 'bg-indigo-600',
        warning: 'bg-yellow-500',
      };
      toast.className = [
        'pointer-events-auto px-4 py-3 rounded-lg text-white text-sm font-medium shadow-lg',
        'toast-enter',
        colors[type] || colors.info,
      ].join(' ');
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('toast-exit');
        toast.addEventListener('transitionend', () => toast.remove());
      }, 3500);
    }

    // HTMX event hooks
    document.body.addEventListener('htmx:responseError', function (e) {
      showToast('Erreur : ' + (e.detail.xhr.statusText || 'Requête échouée'), 'error');
    });

    document.body.addEventListener('htmx:afterRequest', function (e) {
      const hdr = e.detail.xhr.getResponseHeader('X-Toast');
      if (hdr) {
        let payload;
        try { payload = JSON.parse(hdr); } catch { payload = { message: hdr, type: 'info' }; }
        showToast(payload.message || hdr, payload.type || 'info');
      }
    });

    async function setLang(lang) {
      try {
        await fetch('/api/profile/language', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ language: lang }),
        });
      } catch (_) {}
      location.reload();
    }
  </script>

</body>
</html>
